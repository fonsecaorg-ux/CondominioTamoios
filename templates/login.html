<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e40af" id="meta-theme-color">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tamoios">
  <title>Login — Condomínio Tamoios</title>
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('icon_png', size=192) }}">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #f1f5f9;
    }
    [data-theme="light"] body {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 60%, #f8fafc 100%);
      color: #0f172a;
    }
    .login-box {
      width: 100%;
      max-width: 380px;
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-icon {
      font-size: 64px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 16px rgba(14,165,233,.4));
    }
    .login-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: #94a3b8; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px 24px;
    }
    [data-theme="light"] .card {
      background: #fff;
      border-color: #e2e8f0;
    }
    [data-theme="light"] .form-label { color: #475569; }
    [data-theme="light"] .form-control { background: #f1f5f9; border-color: #cbd5e1; color: #0f172a; }
    [data-theme="light"] .login-sub { color: #64748b; }
    [data-theme="light"] .hint { color: #64748b; }
    .btn-theme {
      position: fixed; top: 12px; right: 12px; z-index: 10;
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(30,64,175,.9); color: #fff; border: none;
      display: inline-flex; align-items: center; justify-content: center; font-size: 18px;
      cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    [data-theme="light"] .btn-theme { background: rgba(37,99,235,.9); }
    .btn-theme .fa-sun { display: none; }
    .btn-theme .fa-moon { display: inline; }
    [data-theme="light"] .btn-theme .fa-sun { display: inline; }
    [data-theme="light"] .btn-theme .fa-moon { display: none; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: #475569; font-size: 14px;
    }
    .form-control {
      width: 100%;
      background: #334155;
      border: 1px solid #475569;
      color: #f1f5f9;
      padding: 11px 12px 11px 36px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .form-control:focus { border-color: #0ea5e9; }

    select.form-control { appearance: none; cursor: pointer; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(90deg, #1d4ed8, #0ea5e9);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .9; }

    .alert {
      background: rgba(239,68,68,.15);
      color: #f87171;
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hint { text-align: center; margin-top: 16px; font-size: 12px; color: #475569; }
  </style>
</head>
<body>
<button type="button" class="btn-theme" id="theme-toggle" title="Alternar tema claro/escuro" aria-label="Tema">
  <i class="fas fa-sun"></i><i class="fas fa-moon"></i>
</button>
<div class="login-box">
  <div class="login-header">
    <span class="login-icon">🏘️</span>
    <h1 class="login-title">Condomínio Tamoios</h1>
    <p class="login-sub">Acesse com os dados da sua casa</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="card">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">NÚMERO DA CASA</label>
        <div class="input-wrap">
          <i class="fas fa-home input-icon"></i>
          <input type="text" name="casa" class="form-control" placeholder="Ex: 1, 2, 3..." required autocomplete="username" inputmode="text">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">SENHA</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
    </form>
  </div>

  <p class="hint">Dificuldades? Fale com a administradora — Casa 8</p>
</div>
<script>
(function() {
  var KEY = 'tamoios-theme';
  var root = document.documentElement;
  var meta = document.getElementById('meta-theme-color');
  var theme = localStorage.getItem(KEY) || 'dark';
  function apply(t) {
    root.setAttribute('data-theme', t);
    if (meta) meta.content = t === 'light' ? '#1d4ed8' : '#1e40af';
  }
  apply(theme);
  document.getElementById('theme-toggle').addEventListener('click', function() {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem(KEY, theme);
    apply(theme);
  });
})();
</script>
</body>
</html>

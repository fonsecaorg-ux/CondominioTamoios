<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Condomínio Tamoios</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #f1f5f9;
    }
    .login-box {
      width: 100%;
      max-width: 380px;
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-icon {
      font-size: 64px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 16px rgba(14,165,233,.4));
    }
    .login-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: #94a3b8; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px 24px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: #475569; font-size: 14px;
    }
    .form-control {
      width: 100%;
      background: #334155;
      border: 1px solid #475569;
      color: #f1f5f9;
      padding: 11px 12px 11px 36px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .form-control:focus { border-color: #0ea5e9; }

    select.form-control { appearance: none; cursor: pointer; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(90deg, #1d4ed8, #0ea5e9);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .9; }

    .alert {
      background: rgba(239,68,68,.15);
      color: #f87171;
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hint { text-align: center; margin-top: 16px; font-size: 12px; color: #475569; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    <span class="login-icon">🏘️</span>
    <h1 class="login-title">Condomínio Tamoios</h1>
    <p class="login-sub">Acesse com os dados da sua casa</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="card">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">NÚMERO DA CASA</label>
        <div class="input-wrap">
          <i class="fas fa-home input-icon"></i>
          <input type="text" name="casa" class="form-control" placeholder="Ex: 1, 2, 3..." required autocomplete="username" inputmode="text">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">SENHA</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
    </form>
  </div>

  <p class="hint">Dificuldades? Fale com a administradora — Casa 8</p>
</div>
</body>
</html>
